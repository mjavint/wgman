services:
  wgman:
    build: .
    container_name: wgman
    env_file:
      - path: .env
        required: false   # fall back to inline defaults if .env is absent
    cap_add:
      - NET_ADMIN
    sysctls:
      # IPv4 forwarding — required for WireGuard to route packets between interfaces
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.forwarding=1
      # IPv6 forwarding — required if clients use ::/0 in AllowedIPs
      - net.ipv6.conf.all.forwarding=1
    ports:
      - "${APP_PORT:-5001}:5000"
      - "${WG_PORT:-51820}:51820/udp"
    environment:
      # Inline defaults — values in .env override these
      - DISABLE_LOGIN=${DISABLE_LOGIN:-false}
      - WGUI_USERNAME=${WGUI_USERNAME:-admin}
      - WGUI_PASSWORD=${WGUI_PASSWORD:-admin}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - WGUI_ENDPOINT_ADDRESS=${WGUI_ENDPOINT_ADDRESS:-}
      - WGUI_PUBLIC_URL=${WGUI_PUBLIC_URL:-http://localhost:5001}
      - WGUI_CONFIG_FILE_PATH=${WGUI_CONFIG_FILE_PATH:-/app/db/wg0.conf}
      - WGUI_SERVER_LISTEN_PORT=${WGUI_SERVER_LISTEN_PORT:-51820}
      - WGUI_SERVER_INTERFACE_ADDRESSES=${WGUI_SERVER_INTERFACE_ADDRESSES:-10.252.1.0/24}
      - WGUI_DNS=${WGUI_DNS:-8.8.8.8,8.8.4.4}
      - WGUI_MTU=${WGUI_MTU:-1420}
      - WGUI_PERSISTENT_KEEPALIVE=${WGUI_PERSISTENT_KEEPALIVE:-25}
      - WGUI_TABLE=${WGUI_TABLE:-auto}
      - WGUI_FIREWALL_MARK=${WGUI_FIREWALL_MARK:-}
      # PostUp: enable forwarding + NAT on the default outbound interface (detected at runtime)
      # wg-quick runs this via bash, so $(ip route...) is evaluated inside the container.
      - WGUI_SERVER_POST_UP_SCRIPT=${WGUI_SERVER_POST_UP_SCRIPT:-sysctl -w net.ipv4.ip_forward=1; iptables -A FORWARD -i %i -j ACCEPT; iptables -A FORWARD -o %i -j ACCEPT; iptables -t nat -A POSTROUTING -o $(ip route show default | awk '{print $5}' | head -1) -j MASQUERADE}
      - WGUI_SERVER_POST_DOWN_SCRIPT=${WGUI_SERVER_POST_DOWN_SCRIPT:-iptables -D FORWARD -i %i -j ACCEPT; iptables -D FORWARD -o %i -j ACCEPT; iptables -t nat -D POSTROUTING -o $(ip route show default | awk '{print $5}' | head -1) -j MASQUERADE}
      - WGUI_MANAGE_START=${WGUI_MANAGE_START:-true}
      - WGUI_MANAGE_RESTART=${WGUI_MANAGE_RESTART:-true}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS:-}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-WireGuard Manager}
      # Runtime tuning
      - GODEBUG=asyncpreemptoff=1
      - GOMAXPROCS=1
    volumes:
      - ./db:/app/db
    restart: unless-stopped
    privileged: true
    logging:
      driver: json-file
      options:
        max-size: 50m
